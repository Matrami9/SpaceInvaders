name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Security Audit
        run: npm audit --audit-level=critical || true
     
  testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test

        
      - name: Generate Job Summary
        if: always() 
        run: |
          echo "### 📊 Rapport de CI" >> $GITHUB_STEP_SUMMARY
          echo "| Validation | État |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Linter** | ✅ OK |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tests Unitaires** | ✅ OK |" >> $GITHUB_STEP_SUMMARY
          echo "| **Sécurité** | 🔒 Audit effectué |" >> $GITHUB_STEP_SUMMARY